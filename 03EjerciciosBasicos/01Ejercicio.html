<!DOCTYPE html>

                        </tr>

                                Su daldo es de:
                            </td>

                                <input type="text" name="sueldoi" id="sueldoi" readonly="readonly">

                            <td></td>

                                <input type="button" value="Borrar Datos" name="borrar" onclick="borrar()">
                            </td>
                        </tr>
                </table>
            </div>
        </form>
    </div>
